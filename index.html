<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VeriBorder AI</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>

<style>

:root{
--primary:#4f46e5;
--secondary:#ec4899;
--dark:#0f172a;
--gray:#64748b;
--border:#e2e8f0;
}

body{
margin:0;
font-family:'Pretendard',sans-serif;
color:var(--dark);
background:white;
}

/* NAV */

.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 40px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid #eee;
z-index:10;
}

.logo{
font-size:24px;
font-weight:800;
background:linear-gradient(90deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav button{
background:var(--dark);
color:white;
padding:10px 22px;
border-radius:30px;
border:none;
cursor:pointer;
}

/* HERO */

.hero{
padding:160px 20px 80px;
text-align:center;
max-width:900px;
margin:auto;
}

.hero h1{
font-size:54px;
font-weight:800;
}

.gradient{
background:linear-gradient(90deg,var(--primary),var(--secondary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
font-size:20px;
color:var(--gray);
margin-top:20px;
}

.btn{
margin-top:40px;
padding:16px 36px;
font-size:18px;
border:none;
border-radius:50px;
color:white;
cursor:pointer;
background:linear-gradient(135deg,var(--primary),var(--secondary));
}

/* SECTION */

.section{
padding:90px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

.section h2{
font-size:36px;
margin-bottom:50px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
padding:30px;
border:1px solid var(--border);
border-radius:20px;
text-align:left;
}

.card p{
color:var(--gray);
}

/* DEMO */

.demo-box{
margin-top:40px;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
height:500px;
}

.demo-box iframe{
width:100%;
height:100%;
border:none;
}

/* LOGIN */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:40px;
border-radius:20px;
width:320px;
text-align:center;
}

.modal input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid var(--border);
border-radius:8px;
}

.modal button{
width:100%;
padding:12px;
border:none;
background:var(--dark);
color:white;
border-radius:8px;
margin-top:10px;
}

/* DASHBOARD */

.dashboard{
display:none;
height:100vh;
}

.layout{
display:flex;
height:100%;
}

.sidebar{
width:240px;
background:white;
border-right:1px solid var(--border);
padding:30px;
}

.sidebar div{
margin:12px 0;
cursor:pointer;
}

.main{
flex:1;
padding:40px;
}

.chatbox{
width:100%;
height:600px;
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
}

.chatbox iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<!-- NAV -->

<div class="nav">

<div class="logo">VeriBorder</div>

<button onclick="openLogin()">Login</button>

</div>

<!-- HERO -->

<div class="hero">

<h1>
AI로 글로벌 화장품 수출 규제를
<br>
<span class="gradient">몇 초 만에 분석합니다</span>
</h1>

<p>
Amazon · Shopee · Qoo10 판매 규정을 자동 분석
</p>

<button class="btn" onclick="openLogin()">
무료 시작
</button>

</div>

<!-- PROBLEM -->

<div class="section">

<h2>왜 VeriBorder가 필요한가</h2>

<div class="cards">

<div class="card">
<h3>🌍 국가별 규제</h3>
<p>화장품 성분 규정은 국가마다 다릅니다</p>
</div>

<div class="card">
<h3>🛒 마켓 규정</h3>
<p>Amazon, Shopee 규정이 모두 다릅니다</p>
</div>

<div class="card">
<h3>⚠️ 계정 정지 위험</h3>
<p>규정 위반 시 판매 계정이 정지됩니다</p>
</div>

</div>

</div>

<!-- PRODUCT DEMO -->

<div class="section">

<h2>Product Demo</h2>

<p style="color:var(--gray)">
VeriBorder AI가 실제로 규제를 분석하는 모습
</p>

<div class="demo-box">

<iframe src="PUBLISH_LINK"></iframe>

</div>

</div>

<!-- LOGIN MODAL -->

<div class="modal" id="loginModal">

<div class="modal-content">

<h2>회원가입 / 로그인</h2>

<input id="email" placeholder="이메일">

<input id="password" type="password" placeholder="비밀번호">

<button onclick="signup()">회원가입</button>

<button onclick="login()">로그인</button>

<p id="msg"></p>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<div class="layout">

<div class="sidebar">

<h3>VeriBorder</h3>

<div onclick="showAI()">AI 분석</div>

<div onclick="logout()">로그아웃</div>

</div>

<div class="main">

<h1>AI 규제 분석</h1>

<div class="chatbox">

<iframe src="PUBLISH_LINK"></iframe>

</div>

</div>

</div>

</div>

<script>

function openLogin(){
document.getElementById("loginModal").style.display="flex"
}

function signup(){

let email=document.getElementById("email").value
let pw=document.getElementById("password").value

localStorage.setItem(email,pw)

msg("회원가입 완료")

}

function login(){

let email=document.getElementById("email").value
let pw=document.getElementById("password").value

if(localStorage.getItem(email)==pw){

document.getElementById("landing-page")?.remove()

document.getElementById("dashboard").style.display="block"

document.getElementById("loginModal").style.display="none"

}else{

msg("로그인 실패")

}

}

function logout(){

document.getElementById("dashboard").style.display="none"

location.reload()

}

function msg(t){

document.getElementById("msg").innerText=t

}

</script>

</body>
</html>
