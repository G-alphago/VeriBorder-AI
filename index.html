<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VeriBorder</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
background:white;
}

.logo{
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.header button{
background:black;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
}

/* LOGIN */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-box{
background:white;
padding:30px;
width:320px;
}

.modal-box input{
width:100%;
margin-bottom:10px;
padding:10px;
}

/* LAYOUT */

.wrapper{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:220px;
border-right:1px solid #eee;
padding:20px;
background:white;
}

.sidebar div{
padding:12px;
cursor:pointer;
}

.sidebar div:hover{
background:#f2f2f2;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* HERO */

.hero{
max-width:900px;
}

.hero h1{
font-size:34px;
}

.hero button{
margin-top:20px;
padding:14px 26px;
background:black;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

/* REPORT */

.report{
margin-top:40px;
background:white;
padding:40px;
border:1px solid #ddd;
max-width:900px;
line-height:1.6;
}

.report h2{
margin-top:40px;
}

.report table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.report th{
background:#f1f1f1;
}

.report th, .report td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

/* AI */

#coze-chat-container{
height:500px;
border:1px solid #ddd;
}

/* COMMUNITY */

.post{
border-bottom:1px solid #eee;
padding:15px;
cursor:pointer;
}

.comment{
margin-left:20px;
color:#555;
}

textarea.big{
width:100%;
height:160px;
}

</style>
</head>

<body>

<div class="header">

<div class="logo" onclick="pageHome()">VeriBorder</div>

<button onclick="logout()">Logout</button>

</div>

<div id="loginModal" class="modal">

<div class="modal-box">

<h3>Login / Signup</h3>

<input id="email" placeholder="email">

<input id="password" type="password" placeholder="password">

<button onclick="signup()">회원가입</button>

<button onclick="login()">로그인</button>

</div>

</div>

<div class="wrapper">

<div class="sidebar">

<div onclick="pageHome()">Home</div>

<div onclick="pageAI()">AI 분석</div>

<div onclick="pageCommunity()">Community</div>

<div onclick="pageQA()">Q&A</div>

<div onclick="pageProfile()">회원정보 수정</div>

</div>

<div class="main" id="main"></div>

</div>

<script>

let currentUser=null

function signup(){

let e=email.value
let p=password.value

localStorage.setItem(e,p)

alert("회원가입 완료")

}

function login(){

let e=email.value
let p=password.value

if(localStorage.getItem(e)==p){

currentUser=e

loginModal.style.display="none"

pageHome()

}else{

alert("로그인 실패")

}

}

function logout(){

currentUser=null
loginModal.style.display="flex"
main.innerHTML=""

}

/* AI */

function pageAI(){

main.innerHTML=`

<h2>VeriBorder AI 분석</h2>

<div id="coze-chat-container">

Coze Publish 승인 후

/* COMMUNITY */

let posts=[]

function pageCommunity(){

let html="<h2>Community</h2><button onclick='writePost()'>글 작성</button>"

posts.forEach((p,i)=>{

html+=`<div class="post" onclick="viewPost(${i})">${p.title}</div>`

})

main.innerHTML=html

}

function writePost(){

main.innerHTML=`

<h2>글 작성</h2>

<input id="ptitle">

<textarea id="pcontent"></textarea>

<button onclick="savePost()">게시</button>

`

}

function savePost(){

posts.push({

title:ptitle.value,
content:pcontent.value,
comments:[]

})

pageCommunity()

}

function viewPost(i){

let p=posts[i]

let html=`

<h2>${p.title}</h2>

<p>${p.content}</p>

<button onclick="deletePost(${i})">삭제</button>

<h3>댓글</h3>

<textarea id="c"></textarea>

<button onclick="addComment(${i})">댓글 작성</button>

`

p.comments.forEach(c=>{

html+=`<div class="comment">${c}</div>`

})

main.innerHTML=html

}

function deletePost(i){

posts.splice(i,1)

pageCommunity()

}

function addComment(i){

posts[i].comments.push(c.value)

viewPost(i)

}

/* QNA */

let questions=[]

function pageQA(){

let html=`

<h2>Q&A</h2>

<textarea class="big" id="q"></textarea>

<button onclick="ask()">질문 등록</button>

`

questions.forEach((q,i)=>{

html+=`<div class="post" onclick="viewQ(${i})">${q.q}</div>`

})

main.innerHTML=html

}

function ask(){

questions.push({q:q.value,answers:[]})

pageQA()

}

function viewQ(i){

let q=questions[i]

let html=`

<h3>${q.q}</h3>

<textarea id="a"></textarea>

<button onclick="answer(${i})">답변</button>

`

q.answers.forEach(a=>{

html+=`<div class="comment">${a}</div>`

})

main.innerHTML=html

}

function answer(i){

questions[i].answers.push(a.value)

viewQ(i)

}
