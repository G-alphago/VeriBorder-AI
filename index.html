<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeriBorder AI MVP</title>
<meta name="description" content="1인 화장품 셀러용 글로벌 수출 규제 AI">

<style>
/* 전체 레이아웃 */
body {
  margin:0;
  font-family:'Apple SD Gothic Neo', Arial, sans-serif;
  background:#fff0f5;
  color:#222;
}

/* 로그인/회원가입 모달 */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3);
  display:flex; justify-content:center; align-items:center;
  z-index:1000;
}
.modal-content {
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.modal-content h2 {
  margin-bottom:20px;
  color:#e75480;
}
.modal-content input {
  width:80%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ffc0cb;
  outline:none;
}
.modal-content input:focus {
  border-color:#ff69b4;
  box-shadow:0 0 5px rgba(255,105,180,0.5);
}
.modal-content button {
  margin-top:15px;
  padding:12px 25px;
  border:none;
  background:#ff69b4;
  color:#fff;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.modal-content button:hover {
  background:#e75480;
}
.modal-content p { margin-top:10px; color:#e75480; }

/* 메인 레이아웃 */
.wrapper {
  display:flex;
  min-height:100vh;
  transition: all 0.3s;
}

/* 사이드 메뉴 */
.sidebar {
  width:220px;
  background:#ffe6f0;
  padding-top:40px;
  flex-shrink:0;
  transition: all 0.3s;
}
.sidebar h2 {
  text-align:center;
  color:#e75480;
  margin-bottom:30px;
  font-size:22px;
}
.sidebar ul {
  list-style:none;
  padding:0;
}
.sidebar ul li {
  padding:14px 20px;
  cursor:pointer;
  color:#222;
  font-weight:500;
  border-radius:8px;
  transition: background 0.2s;
}
.sidebar ul li:hover {
  background:#ffc0cb;
}

/* 메인 콘텐츠 */
.main {
  flex-grow:1;
  padding:40px;
}
.main h1 {
  color:#e75480;
  margin-bottom:20px;
}
.main p { line-height:1.6; }

/* Coze 챗봇 영역 */
#coze-chat-container {
  width:100%;
  max-width:900px;
  height:600px;
  margin-top:20px;
  border-radius:15px;
  overflow:hidden;
  border:1px solid #ffc0cb;
}

/* 모바일 대응 */
@media (max-width:768px){
  .wrapper {flex-direction:column;}
  .sidebar {width:100%; display:flex; overflow-x:auto;}
  .sidebar ul {display:flex; flex-direction:row;}
  .sidebar ul li {flex:1; text-align:center; margin:0 2px;}
}
</style>
</head>
<body>

<!-- 로그인/회원가입 모달 -->
<div id="authModal" class="modal">
  <div class="modal-content">
    <h2>회원가입 / 로그인</h2>
    <input type="email" id="email" placeholder="이메일" required><br>
    <input type="password" id="password" placeholder="비밀번호" required><br>
    <button onclick="signup()">회원가입</button>
    <button onclick="login()">로그인</button>
    <p id="authMessage"></p>
  </div>
</div>

<div class="wrapper">
  <!-- 사이드 메뉴 -->
  <div class="sidebar">
    <h2>VeriBorder</h2>
    <ul>
      <li onclick="showPage('profile')">개인정보 수정</li>
      <li onclick="showPage('qa')">Q&A</li>
      <li onclick="showPage('community')">Community</li>
      <li onclick="showPage('about')">베리보더 소개</li>
      <li onclick="showPage('ai')">AI 분석</li>
    </ul>
  </div>

  <!-- 메인 영역 -->
  <div class="main" id="mainContent">
    <h1>VeriBorder AI 분석</h1>
    <p>회원가입 후 글로벌 화장품 수출 규제 분석 기능을 사용할 수 있습니다.</p>
    <div id="coze-chat-container"></div>
  </div>
</div>

<!-- Coze Chat SDK -->
<script src="https://sf-cdn.coze.com/obj/unpkg-va/flow-platform/chat-app-sdk/1.2.0-beta.6/libs/oversea/index.js"></script>

<script>
// 간단 회원가입/로그인 (localStorage MVP)
function signup(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if(!email || !password){ showAuthMessage("이메일과 비밀번호 입력 필요"); return;}
  localStorage.setItem(email,password);
  showAuthMessage("회원가입 완료! 로그인 버튼 클릭");
}
function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const saved = localStorage.getItem(email);
  if(saved && saved===password){
    document.getElementById('authModal').style.display='none';
    initCoze();
  } else showAuthMessage("로그인 실패: 이메일 또는 비밀번호 확인");
}
function showAuthMessage(msg){ document.getElementById('authMessage').innerText=msg; }

// 사이드 메뉴 전환
function showPage(page){
  const main = document.getElementById('mainContent');
  switch(page){
    case 'profile':
      main.innerHTML="<h1>개인정보 수정</h1><p>회원 정보를 수정할 수 있습니다.</p>";
      break;
    case 'qa':
      main.innerHTML="<h1>Q&A</h1><p>자주 묻는 질문 확인.</p>";
      break;
    case 'community':
      main.innerHTML="<h1>Community</h1><p>커뮤니티 게시판 MVP 영역.</p>";
      break;
    case 'about':
      main.innerHTML="<h1>베리보더 소개</h1><p>K-뷰티 1인 화장품 셀러를 위한 글로벌 수출 AI 플랫폼.</p>";
      break;
    case 'ai':
      main.innerHTML="<h1>VeriBorder AI 분석</h1><div id='coze-chat-container'></div>";
      initCoze();
      break;
  }
}

// Coze 챗봇 초기화
function initCoze(){
  const PAT_TOKEN = "pat_hYlugJ838RbOfR3kQdfEUGs1fljpzm6tkcX1NOStLLKoJgqXXuys6ROxsErKXotQ";
  new CozeWebSDK.WebChatClient({
    config:{bot_id:"7611026549898919989"},
    componentProps:{title:"VeriBorder AI Assistant", container:"#coze-chat-container"},
    auth:{type:"token", token:PAT_TOKEN, onRefreshToken:()=>PAT_TOKEN}
  });
}
</script>
</body>
</html>
