<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>VeriBorder AI</title>

<style>

body{
margin:0;
font-family:Arial;
}

/* NAV */

.nav{

position:fixed;
top:0;
left:0;
right:0;

display:flex;
justify-content:space-between;
align-items:center;

padding:15px 30px;

background:white;

box-sizing:border-box;

border-bottom:1px solid #eee;

}

.logo{

font-size:22px;
font-weight:bold;

}

.nav button{

padding:10px 20px;
border:none;
background:black;
color:white;
cursor:pointer;

}

/* HERO */

.hero{

padding-top:120px;
text-align:center;

}

.hero h1{

font-size:42px;

}

.hero p{

color:#666;

}

.btn{

margin-top:30px;

padding:15px 35px;

background:#4f46e5;

color:white;

border:none;

cursor:pointer;

}

/* SECTION */

.section{

padding:80px 20px;
text-align:center;

}

/* DEMO */

.demo{

width:90%;
max-width:900px;
height:500px;

margin:auto;

border:1px solid #ddd;

border-radius:10px;

overflow:hidden;

}

.demo iframe{

width:100%;
height:100%;
border:none;

}

/* LOGIN */

.modal{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.6);

display:none;

justify-content:center;
align-items:center;

}

.modal-content{

background:white;

padding:30px;

border-radius:10px;

width:300px;

text-align:center;

}

.modal input{

width:100%;
padding:10px;
margin:8px 0;

}

.modal button{

width:100%;
padding:10px;
margin-top:10px;

}

/* DASHBOARD */

.dashboard{

display:none;

padding-top:80px;

}

.chatbox{

width:90%;
max-width:900px;

height:600px;

margin:auto;

border:1px solid #ddd;

border-radius:10px;

overflow:hidden;

}

.chatbox iframe{

width:100%;
height:100%;
border:none;

}

</style>

</head>

<body>

<!-- NAV -->

<div class="nav">

<div class="logo">VeriBorder</div>

<button id="navBtn" onclick="openLogin()">Login</button>

</div>

<!-- HERO -->

<div class="hero" id="hero">

<h1>AI로 글로벌 화장품 규제를 분석합니다</h1>

<p>Amazon · Shopee · Qoo10 규정 자동 분석</p>

<button class="btn" id="startBtn" onclick="openLogin()">무료 시작</button>

</div>

<!-- DEMO -->

<div class="section" id="demoSection">

<h2>Product Demo</h2>

<div class="demo">

<iframe src="PUBLISH_LINK"></iframe>

</div>

</div>

<!-- LOGIN -->

<div class="modal" id="loginModal">

<div class="modal-content">

<h2>회원가입 / 로그인</h2>

<input id="email" placeholder="이메일">

<input id="password" type="password" placeholder="비밀번호">

<button onclick="signup()">회원가입</button>

<button onclick="login()">로그인</button>

<p id="msg"></p>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboard">

<h2 style="text-align:center">AI 규제 분석</h2>

<div class="chatbox">

<iframe src="PUBLISH_LINK"></iframe>

</div>

</div>

<script>

function openLogin(){

document.getElementById("loginModal").style.display="flex"

}

function signup(){

let email=document.getElementById("email").value
let pw=document.getElementById("password").value

if(!email||!pw){

msg("입력 필요")
return

}

localStorage.setItem(email,pw)

msg("회원가입 완료")

}

function login(){

let email=document.getElementById("email").value
let pw=document.getElementById("password").value

if(localStorage.getItem(email)==pw){

document.getElementById("loginModal").style.display="none"

document.getElementById("hero").style.display="none"

document.getElementById("demoSection").style.display="none"

document.getElementById("dashboard").style.display="block"

document.getElementById("startBtn").style.display="none"

document.getElementById("navBtn").innerText="Dashboard"

}else{

msg("로그인 실패")

}

}

function msg(t){

document.getElementById("msg").innerText=t

}

</script>

</body>
</html>
