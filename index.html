<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>VeriBorder</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fafafa;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #eee;
background:white;
}

.logo{
font-size:20px;
font-weight:bold;
}

.header button{
background:black;
color:white;
border:none;
padding:10px 18px;
cursor:pointer;
}

/* LOGIN MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:flex;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:30px;
width:320px;
}

.modal-box input{
width:100%;
margin-bottom:10px;
padding:10px;
}

/* LAYOUT */

.wrapper{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:220px;
border-right:1px solid #eee;
padding:20px;
background:white;
}

.sidebar div{
padding:12px;
cursor:pointer;
}

.sidebar div:hover{
background:#f2f2f2;
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

/* AI */

#coze-chat-container{
height:500px;
border:1px solid #ddd;
margin-bottom:40px;
}

/* REPORT */

.report{
background:white;
padding:20px;
border:1px solid #eee;
}

/* COMMUNITY */

.post{
border-bottom:1px solid #eee;
padding:15px;
cursor:pointer;
}

.comment{
margin-left:20px;
color:#555;
}

/* QNA */

textarea.big{
width:100%;
height:160px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="logo">VeriBorder</div>

<button id="authBtn" onclick="openLogin()">Login</button>

</div>

<!-- LOGIN -->

<div id="loginModal" class="modal" style="display:none">

<div class="modal-box">

<h3>Login / Signup</h3>

<input id="email" placeholder="email">

<input id="password" type="password" placeholder="password">

<button onclick="signup()">회원가입</button>

<button onclick="login()">로그인</button>

</div>

</div>

<!-- MAIN -->

<div class="wrapper">

<div class="sidebar">

<div onclick="pageAI()">AI 분석</div>

<div onclick="pageCommunity()">Community</div>

<div onclick="pageQA()">Q&A</div>

<div onclick="pageProfile()">회원정보 수정</div>

</div>

<div class="main" id="main"></div>

</div>

<script>

/* 로그인 */

let currentUser=null

function openLogin(){
document.getElementById("loginModal").style.display="flex"
}

function signup(){

let e=email.value
let p=password.value

localStorage.setItem(e,p)

alert("signup success")
}

function login(){

let e=email.value
let p=password.value

if(localStorage.getItem(e)==p){

currentUser=e
loginModal.style.display="none"

authBtn.innerText="Logout"
authBtn.onclick=logout

pageAI()

}else{
alert("login fail")
}

}

function logout(){

currentUser=null
authBtn.innerText="Login"
authBtn.onclick=openLogin

main.innerHTML="로그인이 필요합니다."

}

/* AI PAGE */

function pageAI(){

main.innerHTML=`

<h2>VeriBorder AI 분석</h2>

<div id="coze-chat-container">
Coze Publish 승인 후 AI가 여기에 연결됩니다
</div>

<div class="report">

<h3>📄 VeriBorder 정밀 컨설팅 리포트 예시</h3>

<p>🎯 Target: 일본 / Qoo10</p>

<h4>Executive Summary</h4>

판정: 🟢 Pass

<h4>성분 분석</h4>

돌콩오일 / 올리브오일 / 티트리잎오일 등  
→ 특이사항 없음

<h4>광고 카피 세이프티</h4>

"진정 효과" → 규제 가능성  
→ 표현 수정 필요

<h4>필수 서류</h4>

전성분표  
제조증명서  
시험성적서

</div>

`

}

/* COMMUNITY */

let posts=[]

function pageCommunity(){

let html=`<h2>Community</h2>

<button onclick="writePost()">글 작성</button>`

posts.forEach((p,i)=>{

html+=`

<div class="post" onclick="viewPost(${i})">

${p.title}

</div>

`

})

main.innerHTML=html

}

function writePost(){

main.innerHTML=`

<h2>글 작성</h2>

<input id="ptitle" placeholder="title">

<textarea id="pcontent"></textarea>

<button onclick="savePost()">게시</button>

`

}

function savePost(){

posts.push({
title:ptitle.value,
content:pcontent.value,
comments:[]
})

pageCommunity()

}

function viewPost(i){

let p=posts[i]

let html=`

<h2>${p.title}</h2>

<p>${p.content}</p>

<button onclick="deletePost(${i})">삭제</button>

<h3>댓글</h3>

<textarea id="c"></textarea>

<button onclick="addComment(${i})">댓글 작성</button>

`

p.comments.forEach(c=>{
html+=`<div class="comment">${c}</div>`
})

main.innerHTML=html

}

function deletePost(i){

posts.splice(i,1)
pageCommunity()

}

function addComment(i){

posts[i].comments.push(c.value)

viewPost(i)

}

/* Q&A */

let questions=[]

function pageQA(){

let html=`

<h2>Q&A</h2>

<textarea class="big" id="q"></textarea>

<button onclick="ask()">질문 등록</button>

`

questions.forEach((q,i)=>{

html+=`

<div class="post" onclick="viewQ(${i})">

${q.q}

</div>

`

})

main.innerHTML=html

}

function ask(){

questions.push({
q:q.value,
answers:[]
})

pageQA()

}

function viewQ(i){

let q=questions[i]

let html=`

<h3>${q.q}</h3>

<textarea id="a"></textarea>

<button onclick="answer(${i})">답변</button>

`

q.answers.forEach(a=>{
html+=`<div class="comment">${a}</div>`
})

main.innerHTML=html

}

function answer(i){

questions[i].answers.push(a.value)

viewQ(i)

}

/* PROFILE */

function pageProfile(){

main.innerHTML=`

<h2>회원정보 수정</h2>

<input placeholder="이메일 변경">

<input placeholder="이름">

<input placeholder="전화번호">

<input placeholder="비밀번호 변경">

<button>저장</button>

`

}

</script>

</body>
</html>
