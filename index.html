<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<title>VeriBorder</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.login-btn{
background:#2563eb;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

.dashboard{
display:none;
}

.sidebar{
width:220px;
background:#020617;
height:100vh;
position:fixed;
padding-top:40px;
}

.sidebar div{
padding:14px 20px;
cursor:pointer;
}

.sidebar div:hover{
background:#1e293b;
}

.main{
margin-left:220px;
padding:40px;
}

textarea,input{
padding:10px;
margin-top:10px;
}

.post{
border:1px solid #333;
padding:15px;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">VeriBorder</div>

<button id="loginButton" class="login-btn" onclick="openLogin()">Login</button>

</header>

<div id="dashboard" class="dashboard">

<div class="sidebar">

<div onclick="page('ai')">AI 분석</div>
<div onclick="page('history')">분석 히스토리</div>
<div onclick="page('report')">리포트</div>
<div onclick="page('qa')">Q&A</div>
<div onclick="page('community')">Community</div>
<div onclick="page('profile')">회원정보 수정</div>

</div>

<div id="main" class="main"></div>

</div>

<!-- 로그인 모달 -->

<div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:black;align-items:center;justify-content:center;">

<div style="background:white;color:black;padding:30px;border-radius:10px">

<h3>Login</h3>

<input id="email" placeholder="email"><br>
<input id="pw" type="password" placeholder="password"><br>

<button onclick="signup()">회원가입</button>
<button onclick="login()">로그인</button>

<p id="msg"></p>

</div>

</div>

<script>

function openLogin(){

document.getElementById("loginModal").style.display="flex"

}

/* 회원가입 */

function signup(){

let e=email.value
let p=pw.value

localStorage.setItem(e,p)

msg.innerText="가입 완료"

}

/* 로그인 */

function login(){

let e=email.value
let p=pw.value

if(localStorage.getItem(e)==p){

document.getElementById("loginModal").style.display="none"

dashboard.style.display="block"

document.getElementById("loginButton").innerText="Logout"

document.getElementById("loginButton").onclick=logout

page("ai")

}

}

/* 로그아웃 */

function logout(){

location.reload()

}

/* 페이지 전환 */

function page(p){

let m=document.getElementById("main")

/* VeriBorder AI */

if(p=="ai"){

m.innerHTML=`

<h2>VeriBorder AI 분석</h2>

<p>전성분을 입력하면 국가별 규제 리포트를 생성합니다.</p>

<select>

<option>일본</option>
<option>미국</option>
<option>EU</option>

</select>

<br>

<textarea rows="6" cols="80" placeholder="전성분 입력"></textarea>

<br>

<button>분석 시작</button>

`

}

/* 히스토리 */

if(p=="history"){

m.innerHTML=`

<h2>분석 히스토리</h2>

<ul>

<li>클렌징오일 / 일본 / PASS</li>
<li>세럼 / EU / Warning</li>

</ul>

`

}

/* 리포트 */

if(p=="report"){

m.innerHTML=`

<h2>리포트</h2>

<p>분석 후 리포트가 생성됩니다.</p>

<button onclick="window.print()">PDF 다운로드</button>

`

}

/* Q&A */

if(p=="qa"){

m.innerHTML=`

<h2>Q&A</h2>

<textarea id="q" style="width:1000px;height:200px"></textarea>

<br>

<button onclick="addQ()">질문 올리기</button>

<div id="qList"></div>

`

}

/* Community 블로그 */

if(p=="community"){

m.innerHTML=`

<h2>Community</h2>

<button onclick="writePost()">글 올리기</button>

<div id="postList"></div>

`

loadPosts()

}

/* 회원정보 */

if(p=="profile"){

m.innerHTML=`

<h2>회원정보 수정</h2>

<input placeholder="이름"><br>
<input placeholder="전화번호"><br>
<input placeholder="이메일 변경"><br>
<input placeholder="비밀번호 변경"><br>

<button>저장</button>

`

}

}

/* Q&A */

function addQ(){

let text=q.value

qList.innerHTML+=`<p>${text}</p>`

}

/* 글쓰기 */

function writePost(){

main.innerHTML=`

<h2>게시글 작성</h2>

<input id="title" placeholder="제목" style="width:600px"><br>

<textarea id="content" rows="10" cols="80"></textarea>

<br>

<button onclick="publishPost()">게시</button>

`

}

/* 게시 */

function publishPost(){

let title=document.getElementById("title").value
let content=document.getElementById("content").value

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

posts.push({title,content})

localStorage.setItem("posts",JSON.stringify(posts))

page("community")

}

/* 게시글 목록 */

function loadPosts(){

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

let html=""

posts.forEach((p,i)=>{

html+=`

<div class="post">

<h3>${p.title}</h3>

<p>${p.content}</p>

<button onclick="deletePost(${i})">삭제</button>

</div>

`

})

document.getElementById("postList").innerHTML=html

}

/* 삭제 */

function deletePost(i){

let posts=JSON.parse(localStorage.getItem("posts"))

posts.splice(i,1)

localStorage.setItem("posts",JSON.stringify(posts))

page("community")

}

</script>

</body>

</html>
